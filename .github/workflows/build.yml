name: Build desktop installers

# Grant the GITHUB_TOKEN sufficient scopes to create releases.
permissions:
  # Needed to create a draft release and upload assets. The `contents`
  # permission also grants the ability to create releases.
  contents: write

# Tauri bundlers are native, OS-specific tooling — a .msi can only be built
# on Windows, a .dmg only on macOS, deb/rpm only on Linux. This matrix is
# the practical way to get all three without owning three machines. See
# desktop/src-tauri/tauri.conf.json's bundle.targets (deb/rpm, msi/nsis,
# app/dmg — deliberately no appimage) and desktop/src-tauri/README.md for
# what's still scaffold-only (unsigned builds).
#
# One job per OS+arch, not per hardware tier — the backend freeze is a
# THIN build (requirements-common.txt only, no torch/onnxruntime/
# parler-tts/ttstokenizer). CI has no GPU to match those against anyway;
# that decision (and which CUDA/ROCm/DirectML variant to use) now happens
# on the user's own machine at first run instead, via a bundled standalone
# Python (scripts/fetch_setup_python.py) and backend/app/setup/'s
# /api/setup/* endpoints. This used to matrix across a GPU/CPU tier axis
# too (six jobs, Hearth-GPU/Hearth-CPU installers) — collapsed back to
# per-platform-only now that no installer needs to differ by tier at all.
#
# Six jobs: x64 + ARM64 for each of Linux/Windows/macOS. Each is a native
# build on a matching-architecture runner (not cross-compiled), so Rust/
# PyInstaller/etc. all just target the host by default — no extra
# toolchain config needed. macos-26/macos-26-intel (not macos-latest,
# which currently resolves to macOS 15) — confirmed both are GA, not
# preview, via actions/runner-images' own table. macOS Intel
# (macos-26-intel) is the one exception worth knowing about: as of macOS
# 14+, GitHub only offers Intel runners as "-large"-tier instances (bare
# macos-26 is the free ARM64 standard tier; macos-26-intel/-large is a
# separate, always-paid tier — confirmed via GitHub's own billing docs,
# which state "larger runners" always incur per-minute cost regardless of
# repo visibility) — unlike every other runner here, which is free for
# this repo (public). Windows/Linux ARM64 (windows-11-arm,
# ubuntu-24.04-arm) are standard runners, no such cost caveat.
#
# Each job freezes the Python backend (PyInstaller), fetches a bundled
# llama-server, and fetches the bundled setup-time Python, so the
# resulting installer needs none of them pre-installed on the end user's
# machine — see backend/hearth-backend.spec, scripts/build_backend.sh/.ps1,
# scripts/fetch_llama_cpp.py, and scripts/fetch_setup_python.py. Both
# fetch scripts' platform->asset maps were extended for every new
# OS+arch combination here, verified against each upstream release's
# actual asset list (not assumed) before adding.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-26
          - macos-26-intel
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Both Linux runners (x64 and arm64) need these — the same
      # webkit2gtk/gtk3/glib dev packages documented in
      # desktop/src-tauri/README.md's "Linux build prerequisites".
      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev \
            build-essential curl wget file libssl-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Fresh runner, no node_modules — install before tauri-action tries to
      # run beforeBuildCommand (pnpm --dir ../../frontend run build, see
      # tauri.conf.json) or invoke the Tauri CLI from desktop/.
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install desktop (Tauri CLI) dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # Populates desktop/src-tauri/resources/hearth-backend/ — thin build,
      # see backend/hearth-backend.spec and scripts/build_backend.sh/.ps1.
      - name: Freeze backend (Linux/macOS)
        if: "!contains(matrix.platform, 'windows')"
        run: bash scripts/build_backend.sh

      - name: Freeze backend (Windows)
        if: contains(matrix.platform, 'windows')
        run: pwsh scripts/build_backend.ps1

      # Populates desktop/src-tauri/resources/llama-cpp/ — CPU-only on
      # Linux/Windows, Metal-included on macOS (its only variant). See
      # scripts/fetch_llama_cpp.py for exactly what's and isn't bundled.
      - name: Fetch bundled llama-server
        run: |
          uv pip install --quiet --system requests
          python scripts/fetch_llama_cpp.py

      # Populates desktop/src-tauri/resources/setup-python/ — the
      # standalone Python the in-app setup screen uses to pip-install the
      # hardware-matched torch/onnxruntime build at first run. See
      # scripts/fetch_setup_python.py and backend/app/setup/installer.py.
      - name: Fetch bundled setup Python
        run: python scripts/fetch_setup_python.py

      # tauri.conf.json's own "version" field is what actually gets
      # embedded in every installer (Windows "Add/Remove Programs", the
      # .deb/.rpm package version, the .app bundle version) — completely
      # independent of the git tag that triggered the build; Tauri has no
      # built-in mechanism to sync the two (confirmed against its own
      # config docs: omitting "version" falls back to Cargo.toml's, not
      # the git ref). Derived here and passed via --config below instead
      # of hand-editing tauri.conf.json before every tag. Only a real tag
      # push gets the tag's own version (v0.2.0 -> 0.2.0); a
      # workflow_dispatch run (no tag — github.ref_name would just be the
      # branch name, e.g. "main", not a version) falls back to a plain
      # "0.0.0" — NOT "0.0.0-dev": confirmed via Microsoft's own MSI docs
      # that ProductVersion must be strictly numeric `major.minor.build`,
      # no pre-release suffix support at all, so a semver-style dev marker
      # would break the Windows build specifically.
      - name: Determine app version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (needed for a smooth install experience, not just
          # to produce a bundle) is deliberately NOT wired up here — add
          # these as repo secrets once you have real certificates:
          # - Windows: TAURI_SIGNING_PRIVATE_KEY / a real code-signing cert
          # - macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD,
          #   APPLE_TEAM_ID (needed for notarization, or Gatekeeper blocks
          #   the app on any machine but the one that built it)
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Hearth ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Single-quoted, no spaces — see the productName override this
          # replaced earlier this session for exactly why: tauri-action's
          # arg tokenizer doesn't understand backslash-escaped quotes or
          # embedded spaces.
          args: --config '{"version":"${{ steps.version.outputs.value }}"}'
